  <style>
    .category {
      display: block;
      margin:15px auto;
      width: 30vw;
      height: auto;
      padding: 5px;
      border: .3vw solid #c8f48e;
      background-color: rgba(255, 237, 122, 0.2);
      border-radius: calc(8px + 5px);
      box-sizing: border-box;
    }
    .category:hover {
      background-color: rgba(255, 237, 122, 0.6);
      transition-duration: .3s;
    }
    .category>img{
      max-width: 100%;
      height: auto;
      display: block;
      border-radius: 8px 8px 0 0;
    }

    .descCategory{
      width: 100%;
      background-color: white;
      height: 100%;
      text-align: center;
      font-size: 175%;
      font-family: main;
      line-height: 5vh;
      border-radius: 0 0 8px 8px;

      transition-duration: .3s;
    }

    .category:hover > .descCategory{
      background-color: rgba(255,255,255, 0.5);
      font-size: 200%;
      color: #bef574;
      transition-duration: .3s;
    }
    .menu{
      position: relative;
      display: grid;
      grid-template-columns: repeat(2, 0.25fr);
      grid-column-gap: 36px;
      grid-row-gap: 9px;
      max-width: 100%;
      margin:0 auto;
      height: 100%;
      align-items: center;
      justify-content: center;
    }
  </style>
