<!DOCTYPE html>
  <html lang="ru">
  <head>
  <meta charset="UTF-8">
  <script src="../js/menu.js"></script>
  <script src="../../jquery-3.7.1.js" integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4=" crossorigin="anonymous"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../css/style_for_menu.css">

  <title>Суши Cherry Music Bar</title>

<body>
  <script src="../js/upMenu.js">
    $(window).scroll(function(){
      const $el = $('.upMenu');
      const $el3 = $('#header');
      const $el4 = $('.empty');
      let heightHeader = parseInt($el3.css( "height" ));
      let heightMenu = $el.css( "height" );
      $el4.css({'height': heightMenu});
      let isPositionFixed = ($el.css('position') == 'fixed');
      if ($(this).scrollTop() > heightHeader && !isPositionFixed){
        $el.css({'position': 'fixed', 'top': '0px', 'backdropFilter': 'blur(3px)'});
      }
      if ($(this).scrollTop() < heightHeader && isPositionFixed){
        $el.css({'position': 'absolute', 'top': '0px', 'backdropFilter': 'none'});
      }
    });
  </script>

  <header id="#header">
    <div class="logo">
      <img src="../../jpgs/logo.png" alt="Logo">
    </div>
  </header>

        </ul>

    </nav>
