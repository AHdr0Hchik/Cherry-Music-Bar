<!--register.html-->
<!DOCTYPE html>
<html lang="en">
<head>
    <title>Login and register form with Node.js, Express.js and MySQL</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container">
    <h2>Регистрация</h2>
    <form action="/register" method="POST">
        <div class="form-group mb-3">
            <label>Имя</label>
            <input type="text" class="form-control" placeholder="Имя" name="firstName">
        </div>
        <div class="form-group mb-3">
            <label>Фамилия</label>
            <input type="text" class="form-control" placeholder="Фамилия" name="lastName">
        </div>
        <div class="form-group mb-3">
            <label>Логин</label>
            <input type="text" class="form-control" placeholder="Логин" name="userName">
        </div>
        <div class="form-group mb-3">
            <label>Пароль</label>
            <input type="password" class="form-control" placeholder="Пароль" name="password">
        </div>
        <div class="d-grid mt-3">
            <button type="submit" class="btn btn-primary form-control">Зарегистрироваться</button>
        </div>
    </form>
</div>
</body>
</html>
